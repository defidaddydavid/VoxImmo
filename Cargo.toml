[package]
name = "polymarket-sweeper"
version = "0.1.0"
edition = "2021"
authors = ["AutoGenerated"]

[features]
live = []

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
axum = "0.7"
chrono = { version = "0.4", features = ["serde", "clock"] }
clap = { version = "4.5", features = ["derive"] }
config = "0.13"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
time = "0.3"
tokio = { version = "1.37", features = ["full"] }
tokio-tungstenite = "0.21"
tokio-stream = "0.1"
reqwest = { version = "0.11", features = ["json"] }
polars = { version = "0.37.0", features = ["lazy", "dtype-date", "dtype-datetime"] }
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "macros", "chrono"] }
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
prometheus = "0.13"
futures = "0.3"
rand = "0.8"
statrs = "0.16"

[dependencies.ethers]
version = "2.0"
optional = true
default-features = false
features = ["abigen", "rustls"]

[dev-dependencies]
proptest = "1.4"
serde_json = "1.0"

[profile.dev]
opt-level = 1

[profile.release]
lto = true
codegen-units = 1
